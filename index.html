<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD | Training Bureau Database</title>
    <style>
        :root {
            --primary: #c5a059;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --sidebar-width: 60px;
            --sidebar-expanded: 260px;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; display: flex; overflow-x: hidden; }

        /* SIDEBAR */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #0a140d;
            border-right: 2px solid var(--primary);
            position: fixed;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #sidebar:hover { width: var(--sidebar-expanded); }

        .nav-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            white-space: nowrap;
            color: #bbb;
            transition: 0.2s;
        }

        .nav-item:hover { background: rgba(197, 160, 89, 0.1); color: var(--primary); }
        .nav-item.active { background: rgba(197, 160, 89, 0.2); color: var(--primary); border-left: 4px solid var(--primary); }
        .nav-icon { min-width: 25px; margin-right: 20px; font-size: 1.2em; text-align: center; }

        /* MAIN CONTENT */
        #main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { background: linear-gradient(135deg, #1b3022 0%, #0a140d 100%); border-bottom: 4px solid var(--primary); padding: 30px; text-align: center; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.8em; text-transform: uppercase; }

        .search-container {
            padding: 20px 30px;
            background: #151515;
            display: flex;
            gap: 15px;
        }

        #search-input {
            flex: 1;
            background: #222;
            border: 1px solid #333;
            padding: 12px 20px;
            color: white;
            border-radius: 5px;
            font-size: 1em;
        }

        #search-input:focus { outline: 1px solid var(--primary); border-color: var(--primary); }

        .container { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }

        /* CARDS */
        .rank-card { 
            background: var(--card-bg); 
            border-left: 6px solid var(--primary); 
            padding: 20px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-radius: 5px;
            transition: 0.2s;
        }

        .info-main { display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .name { font-size: 1.2em; font-weight: bold; color: white; }
        .dob-label { font-size: 0.8em; color: #777; }
        .badge-pill { background: var(--primary); color: #1b3022; padding: 2px 8px; font-weight: bold; border-radius: 3px; font-size: 0.8em; }

        .certs-grid { display: flex; gap: 10px; }
        .cert-box { 
            background: rgba(255,255,255,0.03); 
            padding: 8px 12px; 
            border-radius: 4px; 
            border: 1px solid rgba(197, 160, 89, 0.1);
            text-align: center;
            min-width: 90px;
        }
        .cert-label { display: block; font-size: 0.65em; color: var(--primary); text-transform: uppercase; margin-bottom: 3px; }
        .cert-val { font-size: 0.9em; font-weight: 500; }
        .status-passed { color: #4CAF50; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 20px; color: var(--primary); font-weight: bold; border-bottom: 1px solid #1b3022;">LSSD TB</div>
    <div class="nav-item active" onclick="filterCategory('all', this)"><span class="nav-icon">📊</span><span>Všeobecný prehľad</span></div>
    <div class="nav-item" onclick="filterCategory('evoc', this)"><span class="nav-icon">🚔</span><span>EVOC Certifikácie</span></div>
    <div class="nav-item" onclick="filterCategory('weapons', this)"><span class="nav-icon">🔫</span><span>Zbraňové kvalifikácie</span></div>
    <div class="nav-item" onclick="filterCategory('seb', this)"><span class="nav-icon">🦅</span><span>SEB Divízia</span></div>
    <div class="nav-item" onclick="filterCategory('medical', this)"><span class="nav-icon">🚑</span><span>Medical / EMT</span></div>
</div>

<div id="main-content">
    <header>
        <h1>Los Santos Sheriff Department</h1>
        <p style="margin:5px 0 0; color:#777; letter-spacing:2px; font-size:0.9em;">Training Bureau Database</p>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Vyhľadať podľa mena, BN (#101) alebo DOB (01/01/1990)..." onkeyup="handleSearch()">
    </div>

    <div class="container" id="roster-container">
        <div style="text-align: center; margin-top: 50px; color: var(--primary);">Pripájanie k šifrovanej databáze...</div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1XV1W7389XpImrUCSHJCgICwEAyQxrzpnP41FQcyKw1w';
    const realCsvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;
    let currentData = [];
    let currentFilter = 'all';

    async function loadRoster() {
        try {
            const response = await fetch(realCsvUrl);
            const csv = await response.text();
            const rows = csv.split('\n').slice(1);
            
            currentData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return {
                    meno: cols[0] || "",
                    badge: cols[1] || "",
                    hodnost: cols[2] || "",
                    evoc: cols[3] || "",
                    zbrane: cols[4] || "",
                    seb: cols[5] || "",
                    medical: cols[6] || "",
                    dob: cols[7] || ""
                };
            }).filter(d => d.meno !== "");

            renderRoster(currentData);
        } catch (e) {
            console.error(e);
        }
    }

    function renderRoster(data) {
        const container = document.getElementById('roster-container');
        container.innerHTML = "";

        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'rank-card';
            card.setAttribute('data-name', p.meno.toLowerCase());
            card.setAttribute('data-badge', p.badge.toLowerCase());
            card.setAttribute('data-dob', p.dob.toLowerCase());

            let certsHtml = "";
            if (currentFilter === 'all') {
                certsHtml = `
                    <div class="cert-box"><span class="cert-label">EVOC</span><span class="cert-val ${p.evoc ? 'status-passed' : ''}">${p.evoc || 'N/A'}</span></div>
                    <div class="cert-box"><span class="cert-label">Weapons</span><span class="cert-val ${p.zbrane ? 'status-passed' : ''}">${p.zbrane || 'N/A'}</span></div>
                    <div class="cert-box"><span class="cert-label">SEB</span><span class="cert-val ${p.seb ? 'status-passed' : ''}">${p.seb || 'N/A'}</span></div>
                `;
            } else {
                const val = p[currentFilter];
                certsHtml = `<div class="cert-box" style="min-width:200px;"><span class="cert-label">${currentFilter.toUpperCase()} STATUS</span><span class="cert-val ${val ? 'status-passed' : ''}">${val || 'NOT QUALIFIED'}</span></div>`;
            }

            card.innerHTML = `
                <div class="info-main">
                    <div class="name-row">
                        <span class="badge-pill">${p.hodnost}</span>
                        <span class="name">${p.meno}</span>
                        <span style="color:var(--primary)">#${p.badge}</span>
                    </div>
                    <div class="dob-label">DOB: ${p.dob || 'Unknown'}</div>
                </div>
                <div class="certs-grid">${certsHtml}</div>
            `;
            container.appendChild(card);
        });
    }

    function handleSearch() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const cards = document.getElementsByClassName('rank-card');

        Array.from(cards).forEach(card => {
            const match = card.getAttribute('data-name').includes(query) || 
                          card.getAttribute('data-badge').includes(query) || 
                          card.getAttribute('data-dob').includes(query);
            card.classList.toggle('hidden', !match);
        });
    }

    function filterCategory(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderRoster(currentData);
        handleSearch();
    }

    loadRoster();
</script>

</body>
</html>
