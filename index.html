<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD | Training Bureau Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #1b3022 0%, #0d1a12 100%); border-bottom: 3px solid #c5a059; padding: 40px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0,5); }
        header h1 { margin: 0; color: #c5a059; letter-spacing: 2px; font-size: 2.5em; text-transform: uppercase; }
        header p { margin: 10px 0 0; font-style: italic; color: #a0a0a0; }
        .container { padding: 30px; max-width: 1000px; margin: auto; }
        .loading { text-align: center; font-size: 1.2em; color: #c5a059; margin-top: 50px; }
        .rank-card { background: #1e1e1e; border-left: 5px solid #c5a059; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; transition: transform 0.2s; }
        .rank-card:hover { transform: scale(1.01); background: #252525; }
        .badge { background: #c5a059; color: #1b3022; padding: 4px 12px; font-weight: bold; border-radius: 3px; margin-right: 15px; font-size: 0.9em; }
        .info-main { display: flex; align-items: center; }
        .name { font-size: 1.2em; font-weight: bold; }
        .certs { display: flex; gap: 15px; font-size: 0.85em; color: #bbb; }
        .cert-item b { color: #c5a059; }
        .status-passed { color: #4CAF50; font-weight: bold; }
        footer { text-align: center; padding: 20px; color: #555; font-size: 0.8em; margin-top: 50px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <h1>L.A.S.D. PORTAL</h1>
    <p>Training Bureau & Personnel Management System</p>
</header>

<div class="container" id="roster-container">
    <div class="loading">Načítavam databázu zástupcov...</div>
</div>

<footer>
    Authorized Personnel Only. Unauthorized access is a violation of CA Penal Code 502.<br>
    &copy; 2026 Los Angeles County Sheriff's Department - FiveM Division
</footer>

<script>
    // Tvoja linka na tabuľku v CSV formáte
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR6_T6P0Xp9Z5xH1X9Xp9Z5xH1X9Xp9Z5xH1X9Xp9Z5xH1X9Xp9Z5xH1X9Xp9Z5xH1X9Xp9Z5xH1X9/pub?output=csv";
    
    // Keďže horný link je špeciálny pre publikovanie, použijeme tvoje ID tabuľky:
    const SPREADSHEET_ID = '1XV1W7389XpImrUCSHJCgICwEAyQxrzpnP41FQcyKw1w';
    const realCsvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadRoster() {
        try {
            const response = await fetch(realCsvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Odstráni hlavičku
            
            const container = document.getElementById('roster-container');
            container.innerHTML = '<h2>Personnel Roster</h2>';

            rows.forEach(row => {
                // Rozdelenie CSV riadku (ošetrenie úvodzoviek)
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/"/g, ''));
                
                if (columns.length >= 3) {
                    const [meno, badge, hodnost, evoc, zbrane, seb] = columns;

                    const card = document.createElement('div');
                    card.className = 'rank-card';
                    card.innerHTML = `
                        <div class="info-main">
                            <span class="badge">${hodnost || 'DEP'}</span>
                            <div class="name">${meno} <span style="color: #777; font-weight: normal; font-size: 0.8em;">#${badge}</span></div>
                        </div>
                        <div class="certs">
                            <div class="cert-item">EVOC: <span class="${evoc ? 'status-passed' : ''}">${evoc || 'N/A'}</span></div>
                            <div class="cert-item">WEAPONS: <span class="${zbrane ? 'status-passed' : ''}">${zbrane || 'N/A'}</span></div>
                            <div class="cert-item">SEB: <span class="${seb ? 'status-passed' : ''}">${seb || 'N/A'}</span></div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        } catch (error) {
            document.getElementById('roster-container').innerHTML = '<div style="color:red">Chyba pri načítaní dát. Skontroluj zdieľanie tabuľky.</div>';
            console.error(error);
        }
    }

    loadRoster();
</script>

</body>
</html>
