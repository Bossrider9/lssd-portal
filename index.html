<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD | Training Bureau Database</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --primary: #c5a059; --bg-dark: #0a0a0a; --card-bg: #161616; --sidebar-width: 70px; --sidebar-expanded: 280px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e0e0e0; margin: 0; display: flex; overflow: hidden; }
        
        #sidebar { width: var(--sidebar-width); height: 100vh; background: #0d140f; border-right: 1px solid #1b3022; position: fixed; transition: 0.3s; overflow: hidden; z-index: 1000; display: flex; flex-direction: column; }
        #sidebar:hover { width: var(--sidebar-expanded); }
        .nav-item { padding: 18px 23px; display: flex; align-items: center; cursor: pointer; color: #888; white-space: nowrap; }
        .nav-item:hover, .nav-item.active { background: rgba(197, 160, 89, 0.1); color: var(--primary); }
        .nav-icon { font-size: 24px; min-width: 25px; margin-right: 25px; }

        #main-content { margin-left: var(--sidebar-width); flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        header { background: #0d140f; border-bottom: 2px solid var(--primary); padding: 25px; text-align: center; }
        header h1 { margin: 0; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; }

        #admin-banner { display: none; background: var(--primary); color: black; padding: 10px; text-align: center; font-weight: bold; }
        .admin-btn { background: black; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        #add-member-form { display: none; background: #1a1a1a; padding: 20px; border-bottom: 1px solid var(--primary); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 1000px; margin: 0 auto; }
        .form-grid input { background: #222; border: 1px solid #444; padding: 10px; color: white; border-radius: 4px; width: 100%; box-sizing: border-box; }

        .search-bar-wrapper { padding: 20px 40px; background: #111; position: sticky; top: 0; z-index: 100; }
        #search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 15px; color: white; border-radius: 8px; outline: none; }
        
        .container { padding: 20px 40px; }
        .rank-card { background: var(--card-bg); border: 1px solid #222; padding: 15px 25px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .rank-card:hover { border-color: var(--primary); background: #1f1f1f; }
        .profile-mini { display: flex; align-items: center; gap: 15px; }
        .mini-photo { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: #333; }

        .license-tag { background: rgba(197, 160, 89, 0.1); border: 1px solid var(--primary); padding: 4px 10px; border-radius: 4px; font-size: 0.75em; display: inline-block; margin-left: 5px; color: var(--primary); text-transform: uppercase; font-weight: bold; }
        
        #profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #161616; width: 550px; border-radius: 12px; border: 1px solid var(--primary); overflow: hidden; position: relative; padding-bottom: 20px; max-height: 90vh; overflow-y: auto; }
        .modal-header { height: 80px; background: #1b3022; }
        .modal-body { padding: 0 30px; text-align: center; margin-top: -50px; }
        .modal-photo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; background: #222; }
        .modal-details { display: grid; grid-template-columns: 1fr; gap: 15px; text-align: left; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        
        .admin-check-list { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #444; max-height: 150px; overflow-y: auto; }
        .admin-check-list label { display: block; font-size: 0.85em; margin-bottom: 5px; cursor: pointer; }
        
        .update-btn { background: var(--primary); color: black; border: none; padding: 12px; width: 80%; margin: 20px auto; display: block; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 25px; cursor: pointer; color: #777; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 20px; color: var(--primary); font-weight: bold; text-align: center;">LSSD</div>
    <div class="nav-item active" onclick="filterCategory('all', this)"><i class='bx bx-grid-alt nav-icon'></i><span>Prehľad</span></div>
    <div class="nav-item" onclick="filterCategory('evoc', this)"><i class='bx bx-car nav-icon'></i><span>EVOC</span></div>
    <div class="nav-item" onclick="filterCategory('zbrane', this)"><i class='bx bx-target-lock nav-icon'></i><span>Zbrane</span></div>
    <div class="nav-item" onclick="filterCategory('seb', this)"><i class='bx bx-shield nav-icon'></i><span>SEB</span></div>
    <div class="nav-item" onclick="filterCategory('medical', this)"><i class='bx bx-plus-medical nav-icon'></i><span>Medical</span></div>
    <div class="nav-item" onclick="filterCategory('asd', this)"><i class='bx bx-navigation nav-icon'></i><span>ASD</span></div>
    <div style="margin-top: auto; border-top: 1px solid #1b3022;">
        <div class="nav-item" onclick="loginAdmin()">
            <i class='bx bx-lock-alt nav-icon'></i><span id="admin-text">Admin Login</span>
        </div>
    </div>
</div>

<div id="main-content">
    <header><h1>Los Santos Sheriff Department</h1></header>
    <div id="admin-banner">ADMIN PANEL AKTÍVNY | <button class="admin-btn" onclick="toggleForm()">+ PRIDAŤ ČLENA</button></div>
    <div id="add-member-form">
        <div class="form-grid">
            <input type="text" id="new-meno" placeholder="Meno a Priezvisko">
            <input type="text" id="new-badge" placeholder="Badge #">
            <input type="text" id="new-hodnost" placeholder="Hodnosť">
            <input type="text" id="new-discord" placeholder="Discord Nick">
            <input type="text" id="new-callsign" placeholder="Callsign">
            <input type="text" id="new-dob" placeholder="Dátum narodenia">
            <input type="text" id="new-tel" placeholder="Telefón">
            <input type="text" id="new-foto" placeholder="Link na foto">
        </div>
        <button onclick="submitMember('create')" style="display:block; margin: 15px auto; background: var(--primary); border:none; padding: 10px 25px; cursor:pointer; font-weight:bold; border-radius: 4px;">ULOŽIŤ DO SYSTÉMU</button>
    </div>
    <div class="search-bar-wrapper"><input type="text" id="search-input" placeholder="Hľadať v databáze..." onkeyup="handleSearch()"></div>
    <div class="container" id="roster-container">Načítavam dáta...</div>
</div>

<div id="profile-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('profile-modal').style.display='none'">&times;</span>
        <div class="modal-header"></div>
        <div class="modal-body" id="modal-data"></div>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1XV1W7389XpImrUCSHJCgICwEAyQxrzpnP41FQcyKw1w';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPucjt4yN-fu-Je_FSKKvI5MOVb9h5zf03xr0CUCsIHmMP5_kmXWubCHIwdIoQq8KP/exec';
    const ADMIN_PASSWORD = "LSSD2026"; 
    const DEFAULT_PHOTO = "https://i.imgur.com/8K9QYm7.png"; 

    let currentData = [], currentFilter = 'all', isAdmin = false;

    const options = {
        evoc: ["Code 3", "Pursuit", "Off-Road", "HSU", "Motor"],
        zbrane: ["Service Handgun", "Less Lethal", "Long Rifle", "Shotgun", "Precision Rifle", "Instructor"],
        seb: ["Operator", "Specialist", "ESD"],
        medical: ["POST First Aid/CPR/AED", "NARCAN Admin", "Tactical Medical (TCCC)"],
        asd: ["Pilot", "TFO"]
    };

    function cleanVal(val) {
        if (!val || val.trim().toUpperCase() === "N/A" || val.trim() === "") return "";
        return val.trim();
    }

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=0`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            currentData = rows.map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/"/g, '').trim());
                return { 
                    meno: c[0], badge: c[1], hodnost: c[2], discord: c[3], callsign: c[4],
                    evoc: cleanVal(c[5]), zbrane: cleanVal(c[6]), seb: cleanVal(c[7]), 
                    medical: cleanVal(c[8]), asd: cleanVal(c[9]), dob: c[10], 
                    foto: c[11] || DEFAULT_PHOTO, tel: c[12]
                };
            }).filter(x => x.meno);
            renderRoster(currentData);
        } catch (e) { console.error("Chyba načítania:", e); }
    }

    function renderRoster(data) {
        const container = document.getElementById('roster-container');
        container.innerHTML = "";
        data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'rank-card';
            card.onclick = () => openProfile(p);
            
            let infoTags = "";
            if (currentFilter !== 'all') {
                const vals = p[currentFilter] ? p[currentFilter].split(', ') : [];
                infoTags = vals.map(v => `<span class="license-tag">${v}</span>`).join('');
            }

            card.innerHTML = `
                <div class="profile-mini">
                    <img src="${p.foto}" class="mini-photo">
                    <div>
                        <b>${p.meno}</b><br>
                        <small>${p.hodnost} • #${p.badge} (${p.callsign})</small>
                    </div>
                </div>
                <div style="display: flex; align-items: center;">
                    ${infoTags}
                    <i class='bx bx-chevron-right' style="margin-left: 10px; color: var(--primary)"></i>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openProfile(p) {
        const modal = document.getElementById('profile-modal');
        const createCheckList = (cat, currentStr) => {
            const currentArr = currentStr ? currentStr.split(', ') : [];
            return `<div class="admin-check-list">` + options[cat].map(opt => `
                <label><input type="checkbox" class="check-${cat}" value="${opt}" ${currentArr.includes(opt) ? 'checked' : ''}> ${opt}</label>
            `).join('') + `</div>`;
        };

        const formatTags = (str) => {
            if(!str || str === "") return `<span style="color:#555; font-size: 0.8em;">Žiadne certifikácie</span>`;
            return str.split(', ').map(v => `<span class="license-tag">${v}</span>`).join('');
        };

        document.getElementById('modal-data').innerHTML = `
            <img src="${p.foto}" class="modal-photo">
            <h2 style="margin:10px 0 5px;">${p.meno}</h2>
            <div style="color:var(--primary); font-weight:bold; margin-bottom:15px;">${p.hodnost} | ${p.callsign}</div>
            <div class="modal-details">
                <div class="detail-item"><b>EVOC:</b><br>${isAdmin ? createCheckList('evoc', p.evoc) : formatTags(p.evoc)}</div>
                <div class="detail-item"><b>ZBRANE:</b><br>${isAdmin ? createCheckList('zbrane', p.zbrane) : formatTags(p.zbrane)}</div>
                <div class="detail-item"><b>MEDICAL:</b><br>${isAdmin ? createCheckList('medical', p.medical) : formatTags(p.medical)}</div>
                <div class="detail-item"><b>ASD:</b><br>${isAdmin ? createCheckList('asd', p.asd) : formatTags(p.asd)}</div>
                <div class="detail-item"><b>SEB:</b><br>${isAdmin ? createCheckList('seb', p.seb) : formatTags(p.seb)}</div>
            </div>
            ${isAdmin ? `<button class="update-btn" onclick="updateExisting('${p.discord}')">ULOŽIŤ ZMENY</button>` : ''}
        `;
        modal.style.display = 'flex';
    }

    async function updateExisting(discord) {
        const getCheck = (cat) => Array.from(document.querySelectorAll(`.check-${cat}:checked`)).map(c => c.value).join(', ') || "";
        const d = { 
            action: "update", discord, 
            evoc: getCheck('evoc'), zbrane: getCheck('zbrane'), 
            seb: getCheck('seb'), medical: getCheck('medical'), asd: getCheck('asd') 
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Profil bol úspešne aktualizovaný!"); location.reload();
    }

    async function submitMember(action) {
        const d = { 
            action, 
            meno: document.getElementById('new-meno').value, 
            badge: document.getElementById('new-badge').value, 
            hodnost: document.getElementById('new-hodnost').value,
            discord: document.getElementById('new-discord').value,
            callsign: document.getElementById('new-callsign').value,
            dob: document.getElementById('new-dob').value, 
            tel: document.getElementById('new-tel').value, 
            foto: document.getElementById('new-foto').value || DEFAULT_PHOTO,
            // TU PRIDÁVAME AUTOMATICKÉ LICENCIE PRE NOVÝ PROFIL
            evoc: "Code 3, Pursuit",
            zbrane: "Service Handgun, Less Lethal",
            medical: "POST First Aid/CPR/AED",
            seb: "",
            asd: ""
        };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Člen pridaný so všetkými základnými licenciami!"); location.reload();
    }

    function filterCategory(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderRoster(currentData);
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.rank-card').forEach(card => {
            card.classList.toggle('hidden', !card.innerText.toLowerCase().includes(val));
        });
    }

    function loginAdmin() {
        if(isAdmin) { location.reload(); return; }
        if(prompt("Admin heslo:") === ADMIN_PASSWORD) { 
            isAdmin = true; 
            document.getElementById('admin-banner').style.display = 'block'; 
            document.getElementById('admin-text').innerText = 'Odhlásiť';
        }
    }

    function toggleForm() { const f = document.getElementById('add-member-form'); f.style.display = f.style.display === 'block' ? 'none' : 'block'; }
    loadData();
</script>
</body>
</html>
