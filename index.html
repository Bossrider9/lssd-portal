<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>LSSD | Training Bureau Portal</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: #f4f4f4; margin: 0; }
        header { background: #1b3022; border-bottom: 3px solid #c5a059; padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .rank-card { background: #2a2a2a; border-left: 5px solid #c5a059; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #c5a059; color: #1b3022; padding: 5px 10px; font-weight: bold; border-radius: 3px; }
        .status-passed { color: #4CAF50; font-weight: bold; }
        .status-pending { color: #ff9800; }
        .nav-btn { background: #c5a059; color: #1b3022; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <h1>LOS ANGELES COUNTY SHERIFF'S DEPARTMENT</h1>
    <p>Training Bureau & Personnel Management</p>
</header>

<div class="container">
    <h2>Personnel Certification Status</h2>
    
    <div class="rank-card">
        <div>
            <span class="badge">DSB</span>
            <strong>John Doe</strong> <i>(Badge #104)</i>
        </div>
        <div>
            EVOC: <span class="status-passed">Class A</span> | 
            Firearms: <span class="status-passed">Qualified</span> | 
            SEB: <span class="status-pending">In Progress</span>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <a href="#" class="nav-btn">Zadať novú certifikáciu</a>
    </div>
</div>

</body>
</html>
